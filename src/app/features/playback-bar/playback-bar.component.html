<div class="gv-playback">

  <!-- Contrôles de transport -->
  <div class="gv-transport">
    <button (click)="runner.goToStep(0)" [disabled]="isFirst" title="Première étape">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M19 5v14l-9-7Z"/><line x1="6" y1="5" x2="6" y2="19"/>
      </svg>
    </button>
    <button (click)="runner.prevStep()" [disabled]="isFirst" title="Précédent (←)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="15 6 9 12 15 18"/>
      </svg>
    </button>
    <button class="gv-play" (click)="togglePlay()" title="Lecture / Pause (Espace)">
      @if (runner.isPlaying()) {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M6 4l14 8-14 8Z"/>
        </svg>
      }
    </button>
    <button (click)="runner.nextStep()" [disabled]="isLast" title="Suivant (→)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="9 6 15 12 9 18"/>
      </svg>
    </button>
    <button (click)="runner.goToStep(totalSteps - 1)" [disabled]="isLast" title="Dernière étape">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M5 5v14l9-7Z"/><line x1="18" y1="5" x2="18" y2="19"/>
      </svg>
    </button>
  </div>

  <!-- Barre de progression -->
  <div class="gv-scrub">
    <span class="gv-scrub-count mono">{{ (stepIndex + 1) | number:'2.0-0' }} / {{ totalSteps | number:'2.0-0' }}</span>
    <div class="gv-scrub-track">
      <div class="gv-scrub-fill" [style.width.%]="scrubPct"></div>
      <input type="range" [min]="0" [max]="totalSteps - 1" [value]="stepIndex"
             (input)="onSliderChange(+$any($event.target).value)">
    </div>
  </div>

  <!-- Vitesse -->
  <div class="gv-speed">
    <span>Vitesse</span>
    <div class="gv-speed-seg">
      @for (preset of speedPresets; track preset.ms) {
        <button [class.on]="speed === preset.ms" (click)="setSpeed(preset.ms)">{{ preset.label }}</button>
      }
    </div>
  </div>

</div>
