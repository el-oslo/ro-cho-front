<header class="gv-topbar">

  <!-- Marque -->
  <div class="gv-brand">
    <div class="gv-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
        <circle cx="6" cy="7" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="16" cy="18" r="2.4"/>
        <path d="M8.2 8.1 14.4 16M8.3 6.6 15.6 6.1"/>
      </svg>
    </div>
    <div class="gv-brand-text">
      <span class="gv-brand-name">Graph-V</span>
      <span class="gv-brand-sub">Visualiseur d'algorithmes de graphes</span>
    </div>
  </div>

  <!-- Sélecteur de mode -->
  <div class="gv-mode-seg">
    <button [class.on]="mode() === 'edit'" (click)="modeChange.emit('edit')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
      </svg>
      <span>Édition</span>
    </button>
    <button [class.on]="mode() === 'visualise'" (click)="modeChange.emit('visualise')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Visualisation</span>
    </button>
  </div>

  <!-- Actions -->
  <div class="gv-topbar-actions">
    <button class="gv-top-btn" (click)="loadPreset.emit()" title="Charger un modèle de graphe">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
        <path d="M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2Z"/><line x1="4" y1="19" x2="18" y2="19"/>
      </svg>
      <span>Modèles</span>
    </button>

    <span class="gv-top-div"></span>

    <button class="gv-top-icon" title="Importer JSON" (click)="triggerImport()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
        <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/>
        <polyline points="8 8 12 4 16 8"/><line x1="12" y1="4" x2="12" y2="15"/>
      </svg>
    </button>
    <input #fileInput type="file" accept=".json" hidden (change)="onFileSelected($event)">

    <button class="gv-top-icon" title="Exporter JSON" (click)="graphService.exportJSON()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
        <path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/>
        <polyline points="8 12 12 16 16 12"/><line x1="12" y1="4" x2="12" y2="16"/>
      </svg>
    </button>

    <span class="gv-top-div"></span>

    <button class="gv-top-icon"
      [title]="darkMode() ? 'Mode clair' : 'Mode sombre'"
      (click)="darkModeChange.emit(!darkMode())">
      @if (darkMode()) {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </div>

</header>
