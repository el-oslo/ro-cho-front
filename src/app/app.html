<div class="app-layout" [class.light-theme]="!darkMode()">

  <app-toolbar
    [darkMode]="darkMode()"
    (darkModeChange)="onDarkModeChange($event)"
  />

  <div class="content-row">

    <div class="left-col">

      <!-- Always-visible algorithm selector bar -->
      <div class="algo-bar">
        <mat-form-field appearance="outline" class="algo-select-field" subscriptSizing="dynamic">
          <mat-label>Algorithm</mat-label>
          <mat-select
            [value]="runner.selectedAlgorithm()?.id ?? null"
            (selectionChange)="runner.selectAlgorithm($event.value)">
            @for (alg of runner.algorithms; track alg.id) {
              <mat-option [value]="alg.id">{{ alg.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        <button mat-icon-button
          (click)="algPanelOpen.update(v => !v)"
          [matTooltip]="algPanelOpen() ? 'Collapse panel' : 'Expand panel'">
          <mat-icon>{{ algPanelOpen() ? 'expand_less' : 'expand_more' }}</mat-icon>
        </button>
      </div>

      <!-- Collapsible algorithm config panel -->
      <div class="algo-strip" [class.collapsed]="!algPanelOpen()">
        <app-algorithm-panel (modeChange)="mode.set($event)" />
      </div>

      <!-- Tab group: Canvas | Matrix -->
      <mat-tab-group class="center-tabs" animationDuration="0ms">
        <mat-tab label="Canvas">
          <div class="tab-content">
            <app-canvas
              [mode]="mode()"
              [darkMode]="darkMode()"
              [outputPanelOpen]="outputPanelOpen()"
              (modeChange)="mode.set($event)"
              (toggleOutputPanel)="outputPanelOpen.update(v => !v)"
              (loadPreset)="openPresetDialog()"
            />
          </div>
        </mat-tab>
        <mat-tab label="Matrix">
          <div class="tab-content">
            <app-matrix-editor />
          </div>
        </mat-tab>
      </mat-tab-group>

      @if (runner.hasRun()) {
        <app-playback-bar />
      }

    </div>

    <!-- Output panel — collapsible right panel -->
    <div class="output-side" [class.collapsed]="!outputPanelOpen()">
      <app-output-panel />
    </div>

  </div>

</div>
