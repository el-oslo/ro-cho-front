<div class="gv-app" [class.dark-theme]="darkMode()">

  <app-toolbar
    [darkMode]="darkMode()"
    [mode]="mode()"
    (darkModeChange)="onDarkModeChange($event)"
    (modeChange)="mode.set($event)"
    (loadPreset)="openPresetDialog()"
  />

  <div class="gv-workspace">

    <!-- Left rail: algorithm configuration (always visible) -->
    <app-algorithm-panel (modeChange)="mode.set($event)" [mode]="mode()" />

    <!-- Stage: canvas / matrix + playback -->
    <main class="gv-stage">
      <div class="gv-stage-tabs">
        <div class="gv-tabs">
          <button [class.on]="activeTab() === 'canvas'" (click)="activeTab.set('canvas')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><circle cx="18" cy="8" r="2.4"/>
              <path d="M6 8.4v7.2M8.2 7A6 6 0 0 1 16 9"/>
            </svg>
            <span>Canevas</span>
          </button>
          <button [class.on]="activeTab() === 'matrix'" (click)="activeTab.set('matrix')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <line x1="4" y1="10" x2="20" y2="10"/>
              <line x1="10" y1="4" x2="10" y2="20"/>
            </svg>
            <span>Matrice</span>
          </button>
        </div>

        @if (mode() === 'edit') {
          <div class="gv-stage-hint">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><line x1="12" y1="8" x2="12" y2="8.5"/>
            </svg>
            <span>Cliquez pour ajouter un sommet · glissez la poignée <strong>+</strong> pour relier · double-clic pour renommer</span>
          </div>
        } @else if (runner.hasRun()) {
          <div class="gv-live-badge">
            <span class="gv-live-dot"></span>
            Visualisation en cours
          </div>
        }
      </div>

      <div class="gv-stage-canvas">
        @if (activeTab() === 'canvas') {
          <app-canvas [mode]="mode()" [darkMode]="darkMode()" />
        } @else {
          <app-matrix-editor />
        }
      </div>

      @if (runner.hasRun()) {
        <app-playback-bar />
      }
    </main>

    <!-- Right: output / explainer panel (always visible) -->
    <app-output-panel />

  </div>

</div>
