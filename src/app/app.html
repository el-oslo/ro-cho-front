<div class="app-layout" [class.light-theme]="!darkMode()">

  <app-toolbar
    [mode]="mode()"
    [darkMode]="darkMode()"
    [leftSidenavOpen]="algPanelOpen()"
    [rightSidenavOpen]="outputPanelOpen()"
    (modeChange)="mode.set($event)"
    (darkModeChange)="onDarkModeChange($event)"
    (loadPreset)="openPresetDialog()"
    (toggleLeftSidenav)="algPanelOpen.update(v => !v)"
    (toggleRightSidenav)="outputPanelOpen.update(v => !v)"
  />

  <div class="content-row">

    <!-- Left column: algo strip + canvas/matrix tabs + playback -->
    <div class="left-col">

      <!-- Algorithm panel — collapsible strip above canvas -->
      <div class="algo-strip" [class.collapsed]="!algPanelOpen()">
        <app-algorithm-panel (modeChange)="mode.set($event)" />
      </div>

      <!-- Tab group: Canvas | Matrix -->
      <mat-tab-group class="center-tabs" animationDuration="0ms">
        <mat-tab label="Canvas">
          <div class="tab-content">
            <app-canvas [mode]="mode()" [darkMode]="darkMode()" />
          </div>
        </mat-tab>
        <mat-tab label="Matrix">
          <div class="tab-content">
            <app-matrix-editor />
          </div>
        </mat-tab>
      </mat-tab-group>

      @if (runner.hasRun()) {
        <app-playback-bar />
      }

    </div>

    <!-- Output panel — collapsible right panel inline with canvas -->
    <div class="output-side" [class.collapsed]="!outputPanelOpen()">
      <app-output-panel />
    </div>

  </div>

</div>
